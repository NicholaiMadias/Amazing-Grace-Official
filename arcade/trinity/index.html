<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Trinity Match — a self-contained gem puzzle in the Amazing Grace Nexus Arcade.">
    <title>Trinity Match | Amazing Grace Nexus Arcade</title>
    <link rel="icon" type="image/png" href="../../assets/logo.png">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --accent: #7effd8;
            --gold: #ffd700;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .logo img { height: 32px; width: auto; border-radius: 4px; }

        .nav-link {
            text-decoration: none;
            color: #bfdbfe;
            border: 1px solid var(--border);
            background: #1e3a8a;
            border-radius: 8px;
            padding: 0.45rem 0.9rem;
            font-weight: 600;
        }

        .nav-link:hover { background: #2563eb; color: #fff; }

        main {
            flex: 1;
            padding: 1.25rem;
            display: grid;
            place-items: center;
        }

        .game-shell {
            width: min(92vw, 540px);
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 0 0 0.5rem;
            text-align: center;
            color: var(--gold);
            font-size: clamp(1.4rem, 4vw, 2rem);
        }

        .lead {
            margin: 0 0 1rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
        }

        #matrix-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
        }

        .tile {
            aspect-ratio: 1;
            display: grid;
            place-items: center;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(30, 41, 59, 0.8);
            user-select: none;
        }

        footer {
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 1rem;
            color: var(--muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="../../" class="logo" aria-label="Amazing Grace Home Living — Home">
            <img src="../../assets/logo.png" alt="Amazing Grace Home Living Logo">
        </a>
        <a href="../" class="nav-link">← Back to Arcade</a>
    </header>

    <main>
        <section class="game-shell" aria-label="Trinity Match puzzle board">
            <h1>🔺 Trinity Match</h1>
            <p class="lead">Self-contained replacement for the previous Match Maker route.</p>
            <div id="matrix-grid" role="grid" aria-label="Trinity Match board"></div>
        </section>
    </main>

    <footer>&copy; 2026 Amazing Grace Home Living — amazinggracehl.org</footer>

    <script>
        const SYMBOLS = ['⭐', '☀️', '💎', '🔮', '🌌', '✨'];
        const GRID_SIZE = 6;
        const gridEl = document.getElementById('matrix-grid');

        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i += 1) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
            gridEl.appendChild(tile);
        }
    </script>
</body>
</html>
